<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="120" y1="120" x2="904" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F2430"/>
      <stop offset="100%" stop-color="#0E1118"/>
    </linearGradient>

    <!-- Page gradients -->
    <linearGradient id="pageFrontGrad" x1="300" y1="220" x2="760" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDEFF3"/>
    </linearGradient>

    <linearGradient id="pageBackGrad" x1="360" y1="270" x2="820" y2="830" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#D8DDE6"/>
    </linearGradient>

    <linearGradient id="pageBack2Grad" x1="390" y1="300" x2="850" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E9EDF3"/>
      <stop offset="100%" stop-color="#C8CFDB"/>
    </linearGradient>

    <!-- Red accent -->
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5A47"/>
      <stop offset="100%" stop-color="#D71919"/>
    </linearGradient>

    <!-- Pencil body -->
    <linearGradient id="pencilGrad" x1="685" y1="670" x2="850" y2="505" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C81010"/>
      <stop offset="100%" stop-color="#FF5A47"/>
    </linearGradient>

    <!-- Wood -->
    <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3D0A7"/>
      <stop offset="100%" stop-color="#D9A871"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Outer app icon background -->
  <rect x="48" y="48" width="928" height="928" rx="120" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow -->
  <rect x="48" y="48" width="928" height="928" rx="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Back page 2 -->
  <g filter="url(#softShadow)">
    <rect x="395" y="303" width="388" height="540" rx="42" fill="url(#pageBack2Grad)"/>
  </g>

  <!-- Back page 1 -->
  <g filter="url(#softShadow)">
    <rect x="355" y="265" width="388" height="540" rx="42" fill="url(#pageBackGrad)"/>
  </g>

  <!-- Front page -->
  <g filter="url(#shadow)">
    <path
      d="M320 210
         H610
         L730 330
         V740
         C730 773 703 800 670 800
         H320
         C287 800 260 773 260 740
         V270
         C260 237 287 210 320 210
         Z"
      fill="url(#pageFrontGrad)"
    />

    <!-- Fold -->
    <path
      d="M610 210
         L730 330
         H660
         C632 330 610 308 610 280
         V210Z"
      fill="#F8F9FB"
    />
    <path
      d="M610 210
         L730 330
         H660
         C632 330 610 308 610 280
         V210Z"
      fill="none"
      stroke="#D8DDE6"
      stroke-width="2"
    />
  </g>

  <!-- PDF badge -->
  <g filter="url(#softShadow)">
    <rect x="320" y="320" width="210" height="100" rx="18" fill="url(#redGrad)"/>
    <text x="425" y="388"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="66"
          font-weight="700"
          fill="white">PDF</text>
  </g>

  <!-- Selection corners -->
  <g stroke="url(#redGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- top-left -->
    <path d="M330 500 V470 Q330 460 340 460 H370"/>
    <!-- top-right -->
    <path d="M510 460 H540 Q550 460 550 470 V500"/>
    <!-- bottom-left -->
    <path d="M370 650 H340 Q330 650 330 640 V610"/>
    <!-- bottom-right -->
    <path d="M550 610 V640 Q550 650 540 650 H510"/>
  </g>

  <!-- Big T -->
  <text x="440" y="610"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="170"
        font-weight="700"
        fill="url(#redGrad)">T</text>

  <!-- Gray text lines -->
  <g fill="#B7BEC9">
    <rect x="585" y="510" width="135" height="18" rx="9"/>
    <rect x="585" y="565" width="95" height="18" rx="9"/>
    <rect x="585" y="620" width="78" height="18" rx="9"/>
  </g>

  <!-- Red squiggle -->
  <path
    d="M355 745
       C405 705 470 705 525 735
       C565 757 610 757 660 730"
    fill="none"
    stroke="url(#redGrad)"
    stroke-width="10"
    stroke-linecap="round"
  />

  <!-- Pencil -->
  <g transform="rotate(43 748 655)" filter="url(#shadow)">
    <!-- Pencil body -->
    <rect x="650" y="620" width="205" height="56" rx="16" fill="url(#pencilGrad)"/>

    <!-- Pencil darker side -->
    <path
      d="M650 648
         L855 648
         V676
         H650
         Z"
      fill="#B80F0F"
      opacity="0.28"
    />

    <!-- Ferrule band -->
    <rect x="810" y="620" width="18" height="56" fill="#F3F4F6"/>

    <!-- Tip wood -->
    <path
      d="M650 620
         L610 648
         L650 676
         Z"
      fill="url(#woodGrad)"
    />

    <!-- Lead -->
    <path
      d="M610 648
         L594 648
         L610 638
         Z"
      fill="#2B2F39"
    />
    <path
      d="M610 648
         L594 648
         L610 658
         Z"
      fill="#171A21"
    />
  </g>
</svg>